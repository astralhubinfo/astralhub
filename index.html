<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstralHub</title>
<link rel="icon" href="assets/logo-symbol.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --page-bg: #f2f4f7;
    --surface: #ffffff;
    --surface-strong: #eef1f5;
    --border: #e6e9ee;
    --text: #12151b;
    --text-secondary: #6b7280;
    --text-faint: #9aa1ac;
    --accent: #2c5ce0;
    --accent-soft: #eaf0fe;
    --accent-strong: #1c3fa8;
    --live: #e23d3d;
    --brand-sky: #6EC6FF;
    --brand-navy: #243B7A;
    --brand-violet: #8B5CF6;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-display: 'Noto Sans JP', sans-serif;
    --font-mono: 'Roboto Mono', monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--page-bg);
    color: var(--text);
    font-family: var(--font-display);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- Header ---------- */
  .site-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .header-inner {
    max-width: 1240px;
    margin: 0 auto;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 28px;
  }
  .logo { display: flex; align-items: center; flex-shrink: 0; }
  .logo img { height: 56px; width: auto; display: block; }

  .top-nav { display: none; gap: 22px; }
  @media (min-width: 760px) {
    .top-nav { display: flex; }
  }
  .top-nav a {
    display: flex; align-items: center; gap: 6px;
    font-size: 13.5px; font-weight: 500; color: var(--text-secondary);
  }
  .top-nav a:hover { color: var(--accent); }

  .header-right { margin-left: auto; display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn {
    border: 1px solid var(--border); background: var(--bg);
    border-radius: var(--radius-md); width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 15px;
  }
  .icon-btn:hover { background: var(--surface-strong); }

  /* ---------- Filter bar ---------- */
  .filter-bar-wrap {
    max-width: 1240px; margin: 0 auto; padding: 14px 20px 14px;
  }
  .filter-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .game-chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg);
    font-size: 13px; font-weight: 500; color: var(--text-secondary);
    white-space: nowrap;
  }
  .game-chip .swatch {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }
  .game-chip.active {
    background: var(--accent-soft); border-color: var(--accent); color: var(--accent-strong);
  }
  .game-chip.chip-all {
    background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700;
  }
  .game-chip.chip-all.inactive {
    background: var(--bg); border-color: var(--border); color: var(--text-secondary); font-weight: 500;
  }
  /* アイコン表示用の丸いエリア（PCでは非表示、スマホで表示） */
  .chip-icon-wrap {
    display: none;
    position: relative;
    align-items: center; justify-content: center;
    overflow: hidden;
    color: #fff; font-weight: 900;
  }
  .chip-icon-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .chip-icon-fallback { position: relative; z-index: 1; }

  /* ---------- Page ---------- */
  .page {
    max-width: 1240px; margin: 0 auto; padding: 20px;
    display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start;
  }
  @media (max-width: 900px) {
    .page { grid-template-columns: 1fr; padding: 14px 14px 88px; }
    .sidebar { display: none; }
  }

  /* ---------- スマホ版：ゲーム選択メニューをアイコン化 ---------- */
  @media (max-width: 900px) {
    .filter-bar-wrap { padding: 12px 14px 12px; }
    .filter-bar {
      flex-wrap: nowrap;
      gap: 7px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
      /* スクロールできることが分かるよう、右端をふわっとフェードさせる */
      mask-image: linear-gradient(to right, #000 calc(100% - 20px), transparent 100%);
      -webkit-mask-image: linear-gradient(to right, #000 calc(100% - 20px), transparent 100%);
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .game-chip.chip-all {
      flex-shrink: 0;
      padding: 0 13px;
      height: 44px;
      border-radius: 22px;
      font-size: 12px;
    }
    .game-chip[data-game] {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
      justify-content: center;
      background: none;
    }
    .game-chip[data-game] .swatch,
    .game-chip[data-game] .chip-label {
      display: none;
    }
    .game-chip[data-game] .chip-icon-wrap {
      display: flex;
      width: 100%; height: 100%;
      border-radius: 50%;
      font-size: 14.5px;
    }
    .game-chip[data-game].active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
    margin-bottom: 20px;
    scroll-margin-top: 14px;
  }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .panel-title {
    font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 6px;
  }
  .panel-title .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--live); }
  .panel-more { font-size: 12px; color: var(--accent); font-weight: 500; }
  .update-note { font-size: 11px; color: var(--text-faint); margin: 0 0 12px; }

  .pill-tabs { display: flex; gap: 6px; }
  .pill-tab {
    border: 1px solid var(--border); background: var(--bg);
    border-radius: var(--radius-md); padding: 6px 12px;
    font-size: 12.5px; font-weight: 500; color: var(--text-secondary);
  }
  .pill-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

  /* ---------- Card grids ---------- */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 14px;
  }
  /* 公式チャンネル枠専用：件数に関わらず、常に横1列（1行）に固定表示する */
  .card-grid.official-grid {
    grid-template-columns: repeat(4, 1fr);
  }
  .media-card { min-width: 0; }
  .media-thumb {
    position: relative; width: 100%; border-radius: var(--radius-md);
    overflow: hidden; display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; font-size: 22px; letter-spacing: 0.02em;
  }
  .media-thumb.portrait { aspect-ratio: 3/4; }
  .media-thumb.landscape { aspect-ratio: 16/9; }
  .media-thumb-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .game-icon { object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25)); }
  .game-icon.icon-md { width: 48px; height: 48px; }
  .game-icon.icon-sm { max-width: 65%; max-height: 65%; }
  .game-icon-fallback { color: #fff; font-weight: 900; }
  .game-icon-fallback.icon-md { font-size: 20px; }
  .game-icon-fallback.icon-sm { font-size: 15px; }
  .badge-viewers {
    position: absolute; top: 7px; left: 7px;
    background: rgba(226,61,61,0.92); color: #fff;
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    padding: 3px 7px; border-radius: 5px;
    display: flex; align-items: center; gap: 4px;
  }
  .badge-duration {
    position: absolute; right: 6px; bottom: 6px;
    background: rgba(0,0,0,0.72); color: #fff;
    font-family: var(--font-mono); font-size: 10.5px;
    padding: 1px 5px; border-radius: 3px;
  }
  .card-tag-row { display: flex; gap: 6px; margin: 8px 0 5px; }
  .tag {
    font-size: 10.5px; font-weight: 700; padding: 2px 7px; border-radius: 4px;
    color: #fff; white-space: nowrap;
  }
  .tag.tag-cat { background: var(--surface-strong); color: var(--text-secondary); }
  .card-title {
    font-size: 13px; font-weight: 500; margin: 0 0 4px; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-meta {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-faint);
    display: flex; justify-content: space-between;
  }

  /* ---------- スマホ版：サムネイル一覧を2列表示に ---------- */
  @media (max-width: 640px) {
    .panel { padding: 14px; }
    .card-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    /* 公式チャンネル枠：スマホでも常に1行（2個）に固定する */
    .card-grid.official-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .card-title { font-size: 12px; }
    .card-meta { font-size: 10px; }
    .tag { font-size: 10px; padding: 2px 6px; }
    .badge-viewers { font-size: 10px; padding: 2px 6px; }
    .badge-duration { font-size: 9.5px; }
  }

  /* ---------- Sidebar news ---------- */
  .news-list { display: flex; flex-direction: column; }
  .news-item {
    display: flex; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--border); align-items: flex-start;
  }
  .news-item:last-child { border-bottom: none; }
  .news-body { min-width: 0; flex: 1; }
  .news-thumb {
    width: 56px; height: 56px; border-radius: var(--radius-sm);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; font-size: 13px;
  }
  .news-title {
    font-size: 13px; font-weight: 500; margin: 6px 0 4px; line-height: 1.4;
  }
  .news-time { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }

  .empty-state { padding: 30px 10px; text-align: center; color: var(--text-faint); font-size: 13px; }

  .site-footer { border-top: 1px solid var(--border); margin-top: 8px; }
  .footer-inner {
    max-width: 1240px; margin: 0 auto; padding: 18px 20px 80px;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
    font-size: 12px; color: var(--text-faint);
  }
  .footer-inner a { color: var(--accent); font-weight: 500; }
  @media (min-width: 901px) {
    .footer-inner { padding-bottom: 24px; }
  }

  /* ---------- Mobile bottom tabs ---------- */
  .mobile-tabbar { display: none; }
  @media (max-width: 900px) {
    .mobile-tabbar {
      display: flex; gap: 8px;
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 8px 14px calc(8px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border); background: var(--bg); z-index: 20;
    }
    .mobile-tabbar button {
      flex: 1; border: none; border-radius: 10px;
      background: var(--surface-strong); color: var(--text-secondary);
      padding: 13px 0; font-size: 13.5px; font-weight: 700;
      transition: background .15s ease, color .15s ease;
    }
    .mobile-tabbar button.active { background: var(--text); color: #fff; }
  }

  /* ---------- Side panel (settings) ---------- */
  .panel-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 30; display: none; }
  .side-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(320px, 88vw);
    background: var(--bg); z-index: 31; padding: 18px; overflow-y: auto;
    box-shadow: -2px 0 12px rgba(0,0,0,0.08); display: none;
  }
  .side-panel h3 { font-size: 14px; margin: 0 0 12px; }
  .side-panel .close-btn { position: absolute; top: 14px; right: 14px; border: none; background: none; font-size: 18px; color: var(--text-faint); }
  .filter-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .apply-btn { width: 100%; margin-top: 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md); padding: 10px; font-weight: 700; font-size: 13px; }
  .order-hint { font-size: 12px; color: var(--text-faint); margin: -4px 0 14px; }
  .order-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-md);
    margin-bottom: 8px; background: var(--surface-strong);
  }
  .order-label { font-size: 13px; font-weight: 500; }
  .order-btns { display: flex; gap: 4px; }
  .order-btn {
    width: 28px; height: 28px; border: 1px solid var(--border); background: var(--bg);
    border-radius: var(--radius-sm); font-size: 12px; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
  }
  .order-btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="index.html">
      <img src="assets/logo.svg" alt="AstralHub">
    </a>
    <nav class="top-nav">
      <a href="list.html?type=live">LIVE</a>
      <a href="list.html?type=popular">人気動画</a>
      <a href="list.html?type=latest">新着動画</a>
      <a href="list.html?type=news">最新ニュース</a>
    </nav>
    <div class="header-right">
      <a class="icon-btn" href="contact.html" title="お問い合わせ" aria-label="お問い合わせ">✉</a>
      <button class="icon-btn" id="settingsOpenBtn" title="表示順の設定" aria-label="表示順の設定">⚙</button>
    </div>
  </div>
  <div class="filter-bar-wrap">
    <div class="filter-bar" id="filterBar"></div>
  </div>
</header>

<div class="page">
  <main id="mainContent"></main>

  <aside class="sidebar">
    <div class="panel" id="news-section">
      <div class="panel-head">
        <span class="panel-title">最新ニュース</span>
        <a class="panel-more" href="list.html?type=news">もっと見る ›</a>
      </div>
      <div class="news-list" id="sidebarNews"></div>
    </div>
  </aside>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <span>&copy; 2026 AstralHub</span>
    <a href="contact.html">管理人への問い合わせ</a>
  </div>
</footer>

<nav class="mobile-tabbar" id="mobileTabbar">
  <button data-tab="main" class="active">メイン</button>
  <button data-tab="news">ニュース</button>
</nav>

<div class="panel-backdrop" id="panelBackdrop"></div>
<div class="side-panel" id="settingsPanel">
  <button class="close-btn" id="settingsCloseBtn">×</button>
  <h3>表示順を並び替える</h3>
  <p class="order-hint">▲▼で好きな順番に変更できます（自動的に保存されます）</p>
  <div id="settingsRows"></div>
</div>

<script src="assets/config.js"></script>
<script src="assets/site-data.js"></script>
<script>
/* =========================================================
   1. マスターデータ
   - GAMES / CATEGORY_LABEL は assets/config.js から読み込み
   - サンプルデータ・localStorageからの読み込み・カード描画は assets/site-data.js が担当
   ========================================================= */
const { GAMES, CATEGORY_LABEL, SECTION_LABELS, STORAGE_KEYS } = window.ASTRA_CONFIG;
const {
  gameById, timeAgoLabel, emptyHtml,
  liveCardHtml, videoCardHtml, newsItemHtml,
  getFilteredData, refreshYouTubeData, getYoutubeUpdateInfo,
} = window.ASTRA_DATA;

/* =========================================================
   2. 状態
   ========================================================= */
let activeGames = new Set(GAMES.map(g => g.id));
let popularRange = '24'; // 24 | 7 | 30
let officialTab = 'latest'; // 'latest'（新着順）| 'popular'（人気＝7日間の再生数順）

/* ▼サムネイルの初期表示件数の設定 ==========================
   ・popular（人気動画）/ latest（新着動画）/ live（配信）は、トップページでは
     パソコン表示では最初の12個まで、スマホ表示（画面幅640px以下）
     では2×2の4個までを表示します。それ以上見たい場合は、各セクション
     右上の「もっと見る ›」から一覧ページ（list.html）に進んでください。
   ・official（公式チャンネル）は投稿頻度が少ないため、パソコン表示・
     スマホ表示のどちらでも「常に1行だけ」になるように、CSS側の列数
     （.official-grid）と合わせた個数にしてあります
     （パソコン：4個＝1行、スマホ：2個＝1行）。
   ・パソコン表示のliveだけは「できるだけ全部見せたい」という方針のため、
     初期表示は無制限（Infinity）にしています。
     もしパソコン表示の配信も件数を制限したい場合は、下のINITIAL_DISPLAY_LIMITSの
     live の値を Infinity から 24 や 30 などの数字に書き換えてください。
   ============================================================ */
const INITIAL_DISPLAY_LIMITS = { // パソコン表示用
  live: Infinity,
  popular: 12,
  official: 4,  // CSSの .official-grid（パソコン：4列）と合わせる
  latest: 12,
};
const MOBILE_DISPLAY_LIMITS = { // スマホ表示用（画面幅640px以下）
  live: 4,      // スマホでは配信欄も2×2＝4個までに制限
  popular: 4,
  official: 2,  // CSSの .official-grid（スマホ：2列）と合わせる
  latest: 4,
};
// 今の画面幅を見て「スマホ用の件数」か「パソコン用の件数」かを切り替える関数
function getDisplayLimit(sectionKey){
  const isMobile = window.innerWidth <= 640; // 640px以下＝スマホ表示とみなす
  return isMobile ? MOBILE_DISPLAY_LIMITS[sectionKey] : INITIAL_DISPLAY_LIMITS[sectionKey];
}

const SECTION_ORDER_KEYS = ['live', 'popular', 'official', 'latest'];
function loadSectionOrderList(){
  try {
    const raw = localStorage.getItem(STORAGE_KEYS.sectionOrder);
    const arr = raw ? JSON.parse(raw) : null;
    if (Array.isArray(arr) && arr.length === SECTION_ORDER_KEYS.length && SECTION_ORDER_KEYS.every(k => arr.includes(k))) return arr;
  } catch (e) { /* 保存できない/壊れている場合は既定値を使う */ }
  return ['live', 'popular', 'official', 'latest'];
}
function saveSectionOrderList(arr){
  try { localStorage.setItem(STORAGE_KEYS.sectionOrder, JSON.stringify(arr)); } catch (e) { /* 無視 */ }
}
let sectionOrderArr = loadSectionOrderList(); // 例: ['popular','live','official','latest']
let mobileTab = 'main';

/* =========================================================
   3. 描画
   ========================================================= */
// LIVE・人気動画・新着動画は自動取得の対象なので、更新頻度・最終更新時刻の注釈を出す
// kind: 'live'（配信）は基本リアルタイム、'video'（人気・新着動画）は数分キャッシュ、と表示を分ける
function updateNoteHtml(kind){
  const { lastFetchAt, liveCacheMinutes, videoCacheMinutes } = getYoutubeUpdateInfo();
  const cacheMinutes = kind === 'live' ? liveCacheMinutes : videoCacheMinutes;
  const freshLabel = cacheMinutes === 0
    ? 'リアルタイム更新'
    : (cacheMinutes % 60 === 0 ? `${cacheMinutes / 60}時間ごとに更新` : `${cacheMinutes}分ごとに更新`);
  const lastLabel = lastFetchAt ? timeAgoLabel(new Date(lastFetchAt).toISOString()) : '未取得';
  return `<p class="update-note">🔄 ${freshLabel}（最終更新：${lastLabel}）</p>`;
}

// list（配列）を「初期表示の上限」までに切り出して card-grid のHTMLを組み立てる関数。
// 上限を超えた分はここでは表示しない（続きは各セクションの「もっと見る ›」から list.html で見る）。
// sectionKey は 'live' | 'popular' | 'official' | 'latest'
// extraClass は card-grid に追加したいクラス名（例：公式チャンネル枠の 'official-grid'）。省略可。
function cardGridCappedHtml(list, cardFn, sectionKey, emptyMessage, extraClass){
  const gridClass = extraClass ? `card-grid ${extraClass}` : 'card-grid';
  if (!list.length) return `<div class="${gridClass}">${emptyHtml(emptyMessage)}</div>`;
  const limit = getDisplayLimit(sectionKey); // 画面幅（パソコン／スマホ）に応じた表示件数
  const visibleList = Number.isFinite(limit) ? list.slice(0, limit) : list;
  return `<div class="${gridClass}">${visibleList.map(cardFn).join('')}</div>`;
}

function renderFilterBar(){
  const allActive = activeGames.size === GAMES.length;
  let html = `<button class="game-chip chip-all ${allActive ? '' : 'inactive'}" data-all="1">すべて</button>`;
  html += GAMES.map(g => {
    const active = activeGames.has(g.id);
    const initial = (g.name || '?').charAt(0);
    const iconInner = g.icon
      ? `<img class="chip-icon-img" src="${g.icon}" alt="" onerror="this.style.display='none'; this.nextElementSibling.style.removeProperty('display');"><span class="chip-icon-fallback" style="display:none;">${initial}</span>`
      : `<span class="chip-icon-fallback">${initial}</span>`;
    return `<button class="game-chip ${active?'active':''}" data-game="${g.id}" title="${g.name}">
      <span class="swatch" style="background:${g.color}"></span>
      <span class="chip-icon-wrap" style="background:${g.color}">
        ${iconInner}
      </span>
      <span class="chip-label">${g.name}</span>
    </button>`;
  }).join('');
  document.getElementById('filterBar').innerHTML = html;

  document.querySelector('[data-all]').addEventListener('click', () => {
    activeGames = new Set(GAMES.map(g => g.id));
    renderAll();
  });
  document.querySelectorAll('#filterBar .game-chip[data-game]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.game;
      if (activeGames.has(id)) activeGames.delete(id); else activeGames.add(id);
      renderAll();
    });
  });
}

function liveSectionHtml(list){
  return `<div class="panel" id="live-section">
    <div class="panel-head">
      <span class="panel-title"><span class="live-dot"></span>LIVE配信</span>
      <a class="panel-more" href="list.html?type=live">もっと見る ›</a>
    </div>
    ${updateNoteHtml('live')}
    ${cardGridCappedHtml(list, liveCardHtml, 'live', '現在、配信中の対象アカウントはありません')}
  </div>`;
}

function popularSectionHtml(list){
  const sorted = [...list].sort((a,b) => b.views - a.views);
  return `<div class="panel" id="popular-section">
    <div class="panel-head">
      <span class="panel-title">人気動画</span>
      <a class="panel-more" href="list.html?type=popular">もっと見る ›</a>
    </div>
    ${updateNoteHtml('video')}
    <div class="pill-tabs" style="margin-bottom:14px;">
      <button class="pill-tab ${popularRange==='24'?'active':''}" data-range="24">24時間</button>
      <button class="pill-tab ${popularRange==='7'?'active':''}" data-range="7">7日間</button>
      <button class="pill-tab ${popularRange==='30'?'active':''}" data-range="30">30日間</button>
    </div>
    ${cardGridCappedHtml(sorted, videoCardHtml, 'popular')}
  </div>`;
}

function latestSectionHtml(list){
  const sorted = [...list].sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  return `<div class="panel" id="latest-section">
    <div class="panel-head">
      <span class="panel-title">新着動画</span>
      <a class="panel-more" href="list.html?type=latest">もっと見る ›</a>
    </div>
    ${updateNoteHtml('video')}
    ${cardGridCappedHtml(sorted, videoCardHtml, 'latest')}
  </div>`;
}

// ▼公式チャンネル専用の枠。人気動画・新着動画には公式チャンネルの動画は出さず、
//   ここに1本化する。タブで「新着順」⇔「人気（7日間の再生数）順」を切り替えられる。
//   投稿頻度が少ないため、表示は常に1行だけ（CSSの .official-grid と件数を合わせてある）。
function officialSectionHtml(list){
  let sorted;
  if (officialTab === 'popular') {
    const sevenDaysAgoMs = Date.now() - 7 * 24 * 60 * 60 * 1000;
    sorted = list
      .filter(v => new Date(v.publishedAt).getTime() >= sevenDaysAgoMs)
      .sort((a,b) => b.views - a.views);
  } else {
    sorted = [...list].sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  }
  return `<div class="panel" id="official-section">
    <div class="panel-head">
      <span class="panel-title">公式チャンネル</span>
      <a class="panel-more" href="list.html?type=official">もっと見る ›</a>
    </div>
    ${updateNoteHtml('video')}
    <div class="pill-tabs" style="margin-bottom:14px;">
      <button class="pill-tab ${officialTab==='latest'?'active':''}" data-official-tab="latest">新着</button>
      <button class="pill-tab ${officialTab==='popular'?'active':''}" data-official-tab="popular">人気（7日間）</button>
    </div>
    ${cardGridCappedHtml(sorted, videoCardHtml, 'official', '公式チャンネルの動画がありません', 'official-grid')}
  </div>`;
}

function renderMainContent(){
  const el = document.getElementById('mainContent');
  const { live: fLive, videos: fVideos } = getFilteredData(activeGames);
  // 公式チャンネルの動画（isOfficial:true）と、それ以外（一般投稿者）の動画に分ける。
  // 「人気動画」「新着動画」は一般投稿者のみを対象にし、公式は下の「公式チャンネル」枠にまとめる。
  const officialVideos = fVideos.filter(v => v.isOfficial);
  const generalVideos = fVideos.filter(v => !v.isOfficial);

  const blocks = {
    live: liveSectionHtml(fLive),
    popular: popularSectionHtml(generalVideos),
    official: officialSectionHtml(officialVideos),
    latest: latestSectionHtml(generalVideos),
  };
  el.innerHTML = sectionOrderArr.map(key => blocks[key]).join('');

  document.querySelectorAll('.pill-tab[data-range]').forEach(btn => {
    btn.addEventListener('click', () => { popularRange = btn.dataset.range; renderMainContent(); });
  });
  document.querySelectorAll('.pill-tab[data-official-tab]').forEach(btn => {
    btn.addEventListener('click', () => { officialTab = btn.dataset.officialTab; renderMainContent(); });
  });
}

function renderSidebar(){
  const { news } = getFilteredData(activeGames);
  const filteredNews = news.sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
  document.getElementById('sidebarNews').innerHTML =
    filteredNews.length ? filteredNews.map(newsItemHtml).join('') : emptyHtml();
}

function renderMobileMain(){
  if (window.innerWidth <= 900 && mobileTab === 'news') {
    const { news } = getFilteredData(activeGames);
    const filteredNews = news.sort((a,b) => new Date(b.publishedAt) - new Date(a.publishedAt));
    document.getElementById('mainContent').innerHTML =
      `<div class="panel"><div class="panel-head"><span class="panel-title">最新ニュース</span></div>
       <div class="news-list">${filteredNews.length ? filteredNews.map(newsItemHtml).join('') : emptyHtml()}</div></div>`;
    return true;
  }
  return false;
}

function renderAll(){
  renderFilterBar();
  const handledByMobile = renderMobileMain();
  if (!handledByMobile) renderMainContent();
  renderSidebar();
}
renderAll();

/* ▼ここから追加：YouTubeからLIVE・動画データを自動取得する ===========
   1. まず今までのやり方（サンプル or 管理画面登録データ）で画面を表示（上のrenderAll()）
   2. その裏でYouTubeに問い合わせに行く
   3. 取得できたら、画面をYouTubeのデータで再表示する
   ================================================================== */
ASTRA_DATA.refreshYouTubeData().then(updated => {
  if (updated) renderAll();
}).catch(e => {
  console.error('[AstralHub] YouTubeデータの自動取得でエラーが発生しました', e);
});

/* =========================================================
   4. 設定パネル
   ========================================================= */
function closeSettings(){
  document.getElementById('settingsPanel').style.display = 'none';
  document.getElementById('panelBackdrop').style.display = 'none';
}
function renderSettingsRows(){
  document.getElementById('settingsRows').innerHTML = sectionOrderArr.map((key, idx) => `
    <div class="order-row" data-key="${key}">
      <span class="order-label">${SECTION_LABELS[key]}</span>
      <div class="order-btns">
        <button class="order-btn" data-dir="up" data-idx="${idx}" ${idx === 0 ? 'disabled' : ''}>▲</button>
        <button class="order-btn" data-dir="down" data-idx="${idx}" ${idx === sectionOrderArr.length - 1 ? 'disabled' : ''}>▼</button>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.order-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = Number(btn.dataset.idx);
      const swapWith = btn.dataset.dir === 'up' ? idx - 1 : idx + 1;
      if (swapWith < 0 || swapWith >= sectionOrderArr.length) return;
      [sectionOrderArr[idx], sectionOrderArr[swapWith]] = [sectionOrderArr[swapWith], sectionOrderArr[idx]];
      saveSectionOrderList(sectionOrderArr);
      renderSettingsRows();
      renderMainContent();
    });
  });
}

document.getElementById('panelBackdrop').addEventListener('click', closeSettings);
document.getElementById('settingsCloseBtn').addEventListener('click', closeSettings);
document.getElementById('settingsOpenBtn').addEventListener('click', () => {
  renderSettingsRows();
  document.getElementById('settingsPanel').style.display = 'block';
  document.getElementById('panelBackdrop').style.display = 'block';
});

/* =========================================================
   5. モバイルタブ / ヘッダーのニュースリンク
   ========================================================= */
document.querySelectorAll('#mobileTabbar button').forEach(btn => {
  btn.addEventListener('click', () => {
    mobileTab = btn.dataset.tab;
    document.querySelectorAll('#mobileTabbar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAll();
  });
});
window.addEventListener('resize', renderAll);

</script>
