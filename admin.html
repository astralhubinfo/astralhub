<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstralHub 管理画面（ローカル用）</title>
<link rel="icon" href="assets/logo-symbol.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#ffffff; --page-bg:#f2f4f7; --surface:#ffffff; --surface-strong:#eef1f5;
    --border:#e6e9ee; --text:#12151b; --text-secondary:#6b7280; --text-faint:#9aa1ac;
    --accent:#2c5ce0; --accent-soft:#eaf0fe; --accent-strong:#1c3fa8; --live:#e23d3d;
    --radius-sm:4px; --radius-md:8px; --radius-lg:12px;
    --font-display:'Noto Sans JP', sans-serif; --font-mono:'Roboto Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body { background: var(--page-bg); color: var(--text); font-family: var(--font-display); font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased; }
  a { color: inherit; }
  button, select, input, textarea { font-family: inherit; font-size: 13px; }

  .site-header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:10; }
  .header-inner { max-width: 1000px; margin: 0 auto; padding: 12px 20px; display:flex; align-items:center; gap:14px; }
  .header-inner img { height: 40px; }
  .header-inner .badge { font-family: var(--font-mono); font-size:11px; color:#fff; background:var(--accent); padding:3px 8px; border-radius:5px; font-weight:700; }
  .header-inner .back-link { margin-left:auto; font-size:12.5px; color: var(--accent); font-weight:500; text-decoration:none; }

  .page { max-width: 1000px; margin: 0 auto; padding: 20px; }

  .tab-bar { display:flex; gap:8px; margin-bottom: 18px; flex-wrap: wrap; }
  .tab-btn { border:1px solid var(--border); background:var(--bg); border-radius: var(--radius-md); padding: 9px 16px; font-weight:500; color: var(--text-secondary); }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight:700; }

  .panel { background: var(--surface); border:1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
  .panel h2 { font-size:15px; margin: 0 0 14px; }
  .hint { font-size:12px; color: var(--text-faint); margin: -6px 0 14px; line-height:1.6; }

  .form-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 12px; margin-bottom: 14px; }
  .field label { display:block; font-size:12px; color: var(--text-secondary); margin-bottom:5px; font-weight:500; }
  .field input, .field select, .field textarea {
    width:100%; padding: 9px 10px; border:1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
  }
  .field.full { grid-column: 1 / -1; }
  .submit-btn { background: var(--accent); color:#fff; border:none; border-radius: var(--radius-md); padding: 10px 20px; font-weight:700; font-size:13px; }
  .submit-btn:hover { background: var(--accent-strong); }

  table { width:100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { text-align:left; padding: 9px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--text-faint); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; }
  tr:last-child td { border-bottom:none; }
  .swatch-tag { display:inline-flex; align-items:center; gap:5px; font-weight:700; font-size:11px; padding:2px 7px; border-radius:4px; color:#fff; white-space:nowrap; }
  .del-btn { border:1px solid var(--border); background:var(--bg); color: var(--live); border-radius: var(--radius-sm); padding: 4px 9px; font-size:11.5px; }
  .del-btn:hover { background:#fdeaea; }
  .empty-row td { text-align:center; color: var(--text-faint); padding: 24px 0; }
  .url-cell { max-width: 220px; overflow:hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono); font-size:11px; color: var(--accent); }
  .summary-cell { max-width: 260px; overflow:hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-secondary); }

  .table-wrap { overflow-x:auto; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--text); color:#fff; padding: 10px 18px; border-radius: var(--radius-md);
    font-size: 13px; opacity:0; pointer-events:none; transition: opacity 0.25s;
  }
  .toast.show { opacity: 1; }

  /* ▼チャンネル発掘機能 */
  .submit-btn:disabled { background: var(--text-faint); cursor: default; }
  .gacha-only { display:none; }
  .gacha-item-row { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
  .gacha-item-row input[type="text"] { flex:1; padding: 9px 10px; border:1px solid var(--border); border-radius: var(--radius-sm); }
  .gacha-item-row select.gacha-kind { flex:none; width:84px; padding: 9px 6px; border:1px solid var(--border); border-radius: var(--radius-sm); }
  .gacha-highlight-label { flex:none; display:flex; align-items:center; gap:4px; font-size:12px; color: var(--text-secondary); white-space:nowrap; }
  .gacha-item-row .remove-item-btn {
    border:1px solid var(--border); background:var(--bg); color: var(--live); border-radius: var(--radius-sm);
    padding: 8px 11px; font-size:13px; flex:none;
  }
  .add-item-btn {
    border:1px dashed var(--accent); background:var(--accent-soft); color: var(--accent); border-radius: var(--radius-sm);
    padding: 8px 14px; font-size:12.5px; font-weight:600; margin-top:2px;
  }
  .discover-list { display:flex; flex-direction:column; gap:8px; max-height: 480px; overflow-y:auto; }
  .discover-item {
    display:flex; align-items:center; gap:12px; padding:10px; border:1px solid var(--border);
    border-radius: var(--radius-md); cursor:pointer;
  }
  .discover-item:hover { background: var(--surface-strong); }
  .discover-item input[type="checkbox"] { width:16px; height:16px; flex-shrink:0; }
  .discover-thumb { width:48px; height:48px; border-radius:50%; object-fit:cover; background:var(--surface-strong); flex-shrink:0; }
  .discover-info { display:flex; flex-direction:column; gap:2px; min-width:0; }
  .discover-name { font-weight:700; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .discover-meta { font-size:11.5px; color: var(--text-secondary); }
  .discover-id { font-family: var(--font-mono); font-size:11px; color: var(--text-faint); }
  #discoverOutput { font-family: var(--font-mono); font-size:12px; min-height:140px; resize:vertical; }

  /* ▼ログイン画面（パスワード保護） */
  .auth-gate {
    position: fixed; inset: 0; background: var(--page-bg); z-index: 999;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 32px 28px; width: 100%; max-width: 320px; text-align: center;
  }
  .auth-box .auth-icon { font-size: 28px; margin-bottom: 10px; }
  .auth-box h2 { margin: 0 0 6px; font-size: 16px; }
  .auth-box p { font-size: 12px; color: var(--text-faint); margin: 0 0 20px; line-height: 1.6; }
  .auth-box input {
    width: 100%; padding: 11px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    margin-bottom: 12px; font-size: 14px; text-align: center; box-sizing: border-box;
  }
  .auth-box button {
    width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-md);
    padding: 11px; font-weight: 700; font-size: 14px; cursor: pointer;
  }
  .auth-box button:hover { background: var(--accent-strong); }
  .auth-error { color: var(--live); font-size: 12px; margin-top: 12px; display: none; }
</style>
</head>
<body>

<!-- ▼ログイン画面（パスワードが合うまで管理画面の中身は表示されません） -->
<div class="auth-gate" id="authGate">
  <div class="auth-box">
    <div class="auth-icon">🔒</div>
    <h2>管理画面ログイン</h2>
    <p>パスワードを入力してください</p>
    <input type="password" id="authPasswordInput" placeholder="パスワード" autocomplete="off">
    <button id="authSubmitBtn">ログイン</button>
    <div class="auth-error" id="authError">パスワードが違います</div>
  </div>
</div>

<header class="site-header">
  <div class="header-inner">
    <img src="assets/logo.svg" alt="AstralHub">
    <span class="badge">管理画面</span>
    <a class="back-link" href="index.html">← サイトを見る</a>
  </div>
</header>

<div class="page">
  <div class="tab-bar" id="tabBar"></div>
  <div id="tabContent"></div>
</div>

<div class="toast" id="toast"></div>

<script src="assets/config.js"></script>
<script>
const { GAMES, CATEGORY_LABEL, STORAGE_KEYS, ADMIN_PASSWORD_HASH } = window.ASTRA_CONFIG;

const TYPES = {
  news: {
    label: 'ニュース',
    fields: [
      { key:'game', label:'ゲーム', type:'game-select' },
      { key:'cat', label:'カテゴリ', type:'select', options: Object.entries(CATEGORY_LABEL).map(([v,l]) => ({value:v, label:l})) },
      { key:'pinned', label:'固定表示', type:'select', options: [
        {value:'', label:'固定しない'}, {value:'pinned', label:'固定する（常に一番上に表示）'},
      ] },
      { key:'title', label:'タイトル（見出し）', type:'text', full:true, placeholder:'例：新キャラクター「○○」公開' },
      { key:'summary', label:'本文（要約）', type:'textarea', full:true, placeholder:'見出しより少し詳しい説明文（100〜200文字程度）' },
      { key:'url', label:'元ツイート/公式ページのURL', type:'text', full:true, placeholder:'https://x.com/...' },
      { key:'gachaStart', label:'ガチャ開始日時（カテゴリ「ガチャ」の場合のみ）', type:'datetime-local', extraClass:'gacha-only' },
      { key:'gachaEnd', label:'ガチャ終了日時（カテゴリ「ガチャ」の場合のみ）', type:'datetime-local', extraClass:'gacha-only' },
    ],
    columns: ['game','cat','pinned','title','summary','url','time'],
  },
  manualChannels: {
    label: 'チャンネル登録（手動）',
    hint: 'チャンネルIDだけを登録しておくと、次回の自動更新から他のチャンネルと同じようにLIVE・動画が自動で取得されるようになります。テスト用チャンネルや、まだconfig.jsに書き込むか迷っているチャンネルの仮登録に便利です。',
    fields: [
      { key:'game', label:'ゲーム', type:'game-select' },
      { key:'channelId', label:'チャンネルID', type:'text', full:true, placeholder:'UCから始まる24文字（チャンネルページの「チャンネルIDをコピー」から取得）' },
      { key:'label', label:'メモ・ラベル（任意・一覧の見分け用、表示には使いません）', type:'text', full:true, placeholder:'例：原神公式（テスト登録）' },
    ],
    columns: ['game','channelId','label'],
    requiredKey: 'channelId',
  },
  channels: {
    label: 'チャンネル管理',
    fields: [
      { key:'game', label:'ゲーム', type:'game-select' },
      { key:'platform', label:'プラットフォーム', type:'select', options: [
        {value:'youtube', label:'YouTube'}, {value:'twitch', label:'Twitch'}, {value:'other', label:'その他'},
      ] },
      { key:'channel', label:'チャンネル名（表示名と完全一致させてください）', type:'text', full:true, placeholder:'例：原神公式' },
      { key:'language', label:'言語', type:'select', options: [
        {value:'ja', label:'日本語'}, {value:'en', label:'英語'}, {value:'other', label:'その他'},
      ] },
      { key:'blocked', label:'掲載可否', type:'select', options: [
        {value:'allow', label:'掲載する'}, {value:'block', label:'非掲載にする'},
      ] },
      { key:'blockReason', label:'非掲載の理由（任意）', type:'text', full:true, placeholder:'例：投稿者からの掲載停止要望／不適切な内容' },
    ],
    columns: ['game','platform','channel','language','blocked','blockReason'],
    requiredKey: 'channel',
  },
};

let activeType = 'news';
let editingIndex = null; // nullなら新規登録モード、数値なら編集モード（そのインデックスの項目を編集中）

function storageKeyFor(type){
  if (type === 'news') return STORAGE_KEYS.news;
  if (type === 'manualChannels') return STORAGE_KEYS.manualChannels;
  return STORAGE_KEYS.channels;
}
function makeId(){
  return 'item-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 7);
}
function loadItems(type){
  try {
    const raw = localStorage.getItem(storageKeyFor(type));
    const arr = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(arr)) return [];
    // 古いデータにIDが無い場合、ここで補完して保存し直す（記事ページへのリンクに必要なため）
    let changed = false;
    arr.forEach(item => {
      if (!item.id) { item.id = makeId(); changed = true; }
    });
    if (changed) saveItems(type, arr);
    return arr;
  } catch (e) { return []; }
}
function saveItems(type, items){
  try { localStorage.setItem(storageKeyFor(type), JSON.stringify(items)); } catch (e) { showToast('保存に失敗しました（ブラウザのストレージ設定をご確認ください）'); }
}
function gameById(id){ return GAMES.find(g => g.id === id); }

// データベース(SQLite)に保存されている日時は「2026-07-20 12:34:56」のような、
// Tを使わない形式のため、ブラウザによってはそのままDateに渡すと日付が読み取れない
// （NaN日前・Invalid Dateと表示される）ことがある。ここでISO8601形式に変換してから使う。
function toDateSafe(str){
  if (!str) return new Date(NaN);
  const iso = String(str).includes('T') ? str : String(str).replace(' ', 'T') + 'Z';
  return new Date(iso);
}

// ▼ここから追加：チャンネル登録（手動）をデータベース(D1)とやり取りするための関数 ============================================
// 「チャンネル登録（手動）」は、以前はブラウザの中(LocalStorage)に保存していましたが、
// ここからはCloudflare Workers経由でD1データベースに保存・取得するようにします。

// データベースから、登録済みチャンネルの一覧を取得する
async function apiGetChannels(){
  const res = await fetch('/api/channels');
  if (!res.ok) throw new Error('データベースからの取得に失敗しました');
  const rows = await res.json();
  // データベースの列名(channel_id, channel_name, created_at)を、画面表示用の名前に変換する
  return rows.map(r => ({
    id: r.channel_id,
    publishedAt: r.created_at,
    game: r.game,
    channelId: r.channel_id,
    label: r.channel_name,
  }));
}

// データベースにチャンネルを1件登録する
async function apiSaveChannel(item){
  const res = await fetch('/api/channels', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      channel_id: item.channelId,
      channel_name: item.label || '',
      url: '',
      game: item.game,
    }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || '登録に失敗しました（同じチャンネルIDがすでに登録されている可能性があります）');
  }
  return res.json();
}

// データベースからチャンネルを1件削除する
async function apiDeleteChannel(channelId){
  const res = await fetch('/api/channels/' + encodeURIComponent(channelId), { method: 'DELETE' });
  if (!res.ok) throw new Error('削除に失敗しました');
  return res.json();
}

// データベースからニュース一覧を取得する
async function apiGetNews(){
  const res = await fetch('/api/news');
  if (!res.ok) throw new Error('データベースからの取得に失敗しました');
  return res.json();
}

// ニュースを1件、登録・更新する(idがあれば更新、なければ新規登録としてサーバー側で扱う)
async function apiSaveNews(item){
  const res = await fetch('/api/news', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(item),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || '保存に失敗しました');
  }
  return res.json();
}

// データベースからニュースを1件削除する
async function apiDeleteNews(id){
  const res = await fetch('/api/news/' + encodeURIComponent(id), { method: 'DELETE' });
  if (!res.ok) throw new Error('削除に失敗しました');
  return res.json();
}

// ▲ここまで追加 ============================================

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function renderTabBar(){
  const tabs = [
    ...Object.keys(TYPES).map(key => ({ key, label: TYPES[key].label })),
    { key: 'discover', label: 'チャンネル発掘' },
  ];
  document.getElementById('tabBar').innerHTML = tabs.map(t =>
    `<button class="tab-btn ${activeType===t.key?'active':''}" data-type="${t.key}">${t.label}</button>`
  ).join('');
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeType = btn.dataset.type; editingIndex = null; renderTabBar(); renderTabContent(); });
  });
}

function fieldHtml(f){
  if (f.type === 'game-select') {
    return `<div class="field${f.full?' full':''}"><label>${f.label}</label>
      <select data-field="${f.key}">${GAMES.map(g => `<option value="${g.id}">${g.name}</option>`).join('')}</select>
    </div>`;
  }
  if (f.type === 'select') {
    return `<div class="field${f.full?' full':''}"><label>${f.label}</label>
      <select data-field="${f.key}">${f.options.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}</select>
    </div>`;
  }
  if (f.type === 'textarea') {
    return `<div class="field${f.full?' full':''}"><label>${f.label}</label>
      <textarea data-field="${f.key}" rows="3" placeholder="${f.placeholder || ''}"></textarea>
    </div>`;
  }
  return `<div class="field${f.full?' full':''}${f.extraClass?' '+f.extraClass:''}"><label>${f.label}</label>
    <input type="${f.type}" data-field="${f.key}" placeholder="${f.placeholder || ''}">
  </div>`;
}

async function renderTabContent(){
  if (activeType === 'discover') { renderDiscoverTab(); return; }
  const type = TYPES[activeType];

  let items;
  if (activeType === 'manualChannels' || activeType === 'news') {
    const loadingType = activeType; // 読み込み中にタブが切り替えられたかどうかを、あとで確認するために覚えておく
    // データベースからの取得には少し時間がかかるため、その間は「読み込み中」を表示する
    document.getElementById('tabContent').innerHTML = '<div class="panel"><p class="hint">読み込み中…</p></div>';
    try {
      items = loadingType === 'news' ? await apiGetNews() : await apiGetChannels();
    } catch (e) {
      showToast(e.message || 'データベースからの取得に失敗しました');
      items = [];
    }
    // 読み込み中の間にタブが切り替えられていたら、古い結果は表示しない
    if (activeType !== loadingType) return;
  } else {
    items = loadItems(activeType);
  }
  const isEditing = editingIndex !== null && items[editingIndex];
  const editingItem = isEditing ? items[editingIndex] : null;

  const formHtml = `
    <div class="panel">
      <h2>${isEditing ? `編集：${type.label}` : `新規登録：${type.label}`}</h2>
      <p class="hint">${isEditing ? '内容を修正して「保存する」を押してください。' : (type.hint || 'Xの通知などで見つけた投稿の内容を、ここに手で入力してください。登録すると一覧に追加され、サイト（index.html）側にもすぐ反映されます。')}</p>
      <div class="form-grid" id="formGrid">${type.fields.map(fieldHtml).join('')}${activeType === 'news' ? `
        <div class="field full gacha-only" id="gachaItemsField">
          <label>ピックアップ一覧（カテゴリ「ガチャ」の場合のみ／キャラ・武器を自由に追加できます）</label>
          <div id="gachaItemsList"></div>
          <button type="button" class="add-item-btn" id="addGachaItemBtn">＋ ピックアップを追加</button>
        </div>
      ` : ''}</div>
      <div style="display:flex; gap:8px;">
        <button class="submit-btn" id="submitBtn">${isEditing ? '保存する' : '登録する'}</button>
        ${isEditing ? '<button class="submit-btn" id="cancelEditBtn" style="background:var(--text-faint);">キャンセル</button>' : ''}
      </div>
    </div>
  `;

  const rows = items.map((item, idx) => {
    const g = gameById(item.game);
    return `<tr>
      ${type.columns.map(col => {
        if (col === 'game') return `<td><span class="swatch-tag" style="background:${g ? g.color : '#999'}">${g ? g.name : item.game}</span></td>`;
        if (col === 'cat') return `<td>${CATEGORY_LABEL[item.cat] || item.cat}</td>`;
        if (col === 'pinned') return `<td>${item.pinned === 'pinned' ? '<span class="swatch-tag" style="background:#e6a729">📌 固定</span>' : '－'}</td>`;
        if (col === 'url') return `<td class="url-cell" title="${item.url || ''}">${item.url ? `<a href="${item.url}" target="_blank" rel="noopener">${item.url}</a>` : '－'}</td>`;
        if (col === 'summary') return `<td class="summary-cell" title="${(item.summary || '').replace(/"/g,'&quot;')}">${item.summary || '－'}</td>`;
        if (col === 'platform') return `<td>${({youtube:'YouTube', twitch:'Twitch', other:'その他'})[item.platform] || item.platform}</td>`;
        if (col === 'language') return `<td>${({ja:'日本語', en:'英語', other:'その他'})[item.language] || item.language}</td>`;
        if (col === 'blocked') return `<td>${item.blocked === 'block' ? '<span class="swatch-tag" style="background:#e23d3d">非掲載</span>' : '<span class="swatch-tag" style="background:#1fae7a">掲載中</span>'}</td>`;
        if (col === 'blockReason') return `<td>${item.blockReason || '－'}</td>`;
        if (col === 'time') return `<td>${toDateSafe(item.publishedAt).toLocaleString('ja-JP')}</td>`;
        if (col === 'views' || col === 'viewers') return `<td>${(item[col] || 0).toLocaleString()}</td>`;
        return `<td>${item[col] ?? ''}</td>`;
      }).join('')}
      <td style="white-space:nowrap;">
        <button class="del-btn" data-edit-idx="${idx}" style="color:var(--accent); border-color:var(--accent); margin-right:4px;">編集</button>

    </tr>`;
  }).join('');

  const tableHtml = `
    <div class="panel">
      <h2>登録済み一覧（${items.length}件）</h2>
      <div class="table-wrap">
        <table>
          <thead><tr>
            ${type.columns.map(c => `<th>${({game:'ゲーム',cat:'カテゴリ',title:'タイトル',summary:'本文',url:'URL',time:'登録日時',channel:'チャンネル',viewers:'視聴者数',views:'再生数',duration:'長さ',platform:'プラットフォーム',language:'言語',blocked:'掲載可否',blockReason:'非掲載理由',channelId:'チャンネルID',label:'メモ・ラベル'})[c]}</th>`).join('')}
            <th></th>
          </tr></thead>
          <tbody>${rows || `<tr class="empty-row"><td colspan="${type.columns.length+1}">まだ登録がありません</td></tr>`}</tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('tabContent').innerHTML = formHtml + tableHtml;

  // 編集モードの場合、フォームに既存の値を入れておく
  if (isEditing) {
    document.querySelectorAll('#formGrid [data-field]').forEach(el => {
      const key = el.dataset.field;
      if (editingItem[key] !== undefined) el.value = editingItem[key];
    });
  }

  // ▼ここから追加：ガチャのピックアップ一覧(名前・レアリティ・属性/武器種)の入力欄 ============
  // 1行=1体(1つ)のピックアップ。「＋」ボタンで自由に行を増やし、「✕」で削除できる。
  if (activeType === 'news') {
    function addGachaItemRow(item){
      item = item || { name:'', rarity:'', type:'', kind:'character', highlight:false };
      const list = document.getElementById('gachaItemsList');
      const row = document.createElement('div');
      row.className = 'gacha-item-row';
      const esc = (s) => String(s || '').replace(/"/g, '&quot;');
      const kind = item.kind === 'weapon' ? 'weapon' : 'character';
      row.innerHTML = `
        <select class="gacha-kind">
          <option value="character" ${kind==='character'?'selected':''}>キャラ</option>
          <option value="weapon" ${kind==='weapon'?'selected':''}>武器</option>
        </select>
        <input type="text" class="gacha-name" placeholder="名前（例：〇〇）" value="${esc(item.name)}">
        <input type="text" class="gacha-rarity" placeholder="レアリティ（例：★5、S）" value="${esc(item.rarity)}">
        <input type="text" class="gacha-type" placeholder="属性・武器種（例：炎、片手剣）" value="${esc(item.type)}">
        <label class="gacha-highlight-label">
          <input type="checkbox" class="gacha-highlight" ${item.highlight ? 'checked' : ''}>最高レア
        </label>
        <button type="button" class="remove-item-btn">✕</button>
      `;
      row.querySelector('.remove-item-btn').addEventListener('click', () => row.remove());
      list.appendChild(row);
    }
    window.addGachaItemRow = addGachaItemRow; // ボタンのクリックハンドラから呼び出せるようにする

    // カテゴリが「ガチャ」の時だけ、ガチャ専用の入力欄(開始・終了日時、ピックアップ一覧)を表示する
    function updateGachaFieldsVisibility(){
      const catEl = document.querySelector('#formGrid [data-field="cat"]');
      const isGacha = catEl && catEl.value === 'gacha';
      document.querySelectorAll('.gacha-only').forEach(el => {
        el.style.display = isGacha ? 'block' : 'none';
      });
    }
    const catSelectEl = document.querySelector('#formGrid [data-field="cat"]');
    if (catSelectEl) catSelectEl.addEventListener('change', updateGachaFieldsVisibility);

    document.getElementById('addGachaItemBtn').addEventListener('click', () => addGachaItemRow());

    // 編集モードで、既存のピックアップ一覧があれば行を復元する
    if (isEditing && editingItem.gachaItems) {
      try {
        const savedItems = JSON.parse(editingItem.gachaItems);
        if (Array.isArray(savedItems)) savedItems.forEach(addGachaItemRow);
      } catch (e) { /* 壊れたデータは無視する */ }
    }
    updateGachaFieldsVisibility();
  }
  // ▲ここまで追加 ============================================

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const requiredKey = type.requiredKey || 'title';
    const formValues = {};
    let hasRequired = false;
    document.querySelectorAll('#formGrid [data-field]').forEach(el => {
      const key = el.dataset.field;
      let val = el.value;
      if (el.type === 'number') val = Number(val) || 0;
      formValues[key] = val;
      if (key === requiredKey && String(val).trim()) hasRequired = true;
    });
    if (!hasRequired) {
      const label = (type.fields.find(f => f.key === requiredKey) || {}).label || requiredKey;
      showToast(`${label}を入力してください`);
      return;
    }

    // ガチャのピックアップ一覧を、名前が入力されている行だけ集めてformValuesに追加する
    if (activeType === 'news') {
      formValues.gachaItems = Array.from(document.querySelectorAll('#gachaItemsList .gacha-item-row')).map(row => ({
        kind: row.querySelector('.gacha-kind').value,
        name: row.querySelector('.gacha-name').value.trim(),
        rarity: row.querySelector('.gacha-rarity').value.trim(),
        type: row.querySelector('.gacha-type').value.trim(),
        highlight: row.querySelector('.gacha-highlight').checked,
      })).filter(it => it.name);
    }

    if (activeType === 'manualChannels') {
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      try {
        if (isEditing) {
          // チャンネルIDを変更していた場合は、古いIDのデータを消してから新しく登録する
          const oldChannelId = editingItem.channelId;
          if (oldChannelId && oldChannelId !== formValues.channelId) {
            await apiDeleteChannel(oldChannelId);
          }
          await apiSaveChannel(formValues);
          showToast('保存しました');
          editingIndex = null;
        } else {
          await apiSaveChannel(formValues);
          showToast('登録しました');
        }
      } catch (e) {
        showToast(e.message || '保存に失敗しました');
      } finally {
        submitBtn.disabled = false;
      }
      renderTabContent();
      return;
    }

    if (activeType === 'news') {
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      try {
        // 編集の場合はidを一緒に送ることで、サーバー側が「更新」と判断する(登録日時は変わらない)
        const payload = isEditing ? { id: editingItem.id, ...formValues } : formValues;
        await apiSaveNews(payload);
        showToast(isEditing ? '保存しました' : '登録しました');
        editingIndex = null;
      } catch (e) {
        showToast(e.message || '保存に失敗しました');
      } finally {
        submitBtn.disabled = false;
      }
      renderTabContent();
      return;
    }

    const current = loadItems(activeType);
    if (isEditing) {
      // 登録日時(publishedAt)は変更せず、それ以外の項目だけ上書きする
      current[editingIndex] = { ...current[editingIndex], ...formValues };
      saveItems(activeType, current);
      showToast('保存しました');
      editingIndex = null;
    } else {
      current.unshift({ id: makeId(), publishedAt: new Date().toISOString(), ...formValues }); // 新しいものを先頭に
      saveItems(activeType, current);
      showToast('登録しました');
    }
    renderTabContent();
  });

  const cancelBtn = document.getElementById('cancelEditBtn');
  if (cancelBtn) {
    cancelBtn.addEventListener('click', () => { editingIndex = null; renderTabContent(); });
  }

  document.querySelectorAll('.del-btn[data-edit-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      editingIndex = Number(btn.dataset.editIdx);
      renderTabContent();
      document.querySelector('.panel')?.scrollIntoView({ behavior: 'smooth' });
    });
  });

  document.querySelectorAll('.del-btn[data-idx]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const idx = Number(btn.dataset.idx);
      if (editingIndex === idx) editingIndex = null;

      if (activeType === 'manualChannels') {
        const target = items[idx];
        if (!target) return;
        try {
          await apiDeleteChannel(target.channelId);
          showToast('削除しました');
        } catch (e) {
          showToast(e.message || '削除に失敗しました');
        }
        renderTabContent();
        return;
      }

      if (activeType === 'news') {
        const target = items[idx];
        if (!target) return;
        try {
          await apiDeleteNews(target.id);
          showToast('削除しました');
        } catch (e) {
          showToast(e.message || '削除に失敗しました');
        }
        renderTabContent();
        return;
      }

      const current = loadItems(activeType);
      current.splice(idx, 1);
      saveItems(activeType, current);
      renderTabContent();
    });
  });
}

// 「管理画面の中身を表示する処理（renderTabBar・renderTabContent）」は、

const AUTH_SESSION_KEY = 'astra_admin_authed';

// 入力された文字列を、config.js に保存されているのと同じ方式（SHA-256）で暗号化する
async function sha256Hex(text){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function unlockAdmin(){
  document.getElementById('authGate').style.display = 'none';
  renderTabBar();
  renderTabContent();
}

async function tryLogin(){
  const input = document.getElementById('authPasswordInput');
  const errorEl = document.getElementById('authError');
  const hash = await sha256Hex(input.value);
  if (hash === ADMIN_PASSWORD_HASH) {
    // このタブを閉じるまでは再入力不要にする（ブラウザを閉じる・新しいタブで開くと再度必要）
    try { sessionStorage.setItem(AUTH_SESSION_KEY, '1'); } catch (e) {}
    unlockAdmin();
  } else {
    errorEl.style.display = 'block';
    input.value = '';
    input.focus();
  }
}

document.getElementById('authSubmitBtn').addEventListener('click', tryLogin);
document.getElementById('authPasswordInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') tryLogin();
});
document.getElementById('authPasswordInput').focus();

// すでに同じタブ内でログイン済みなら、再入力なしでそのまま表示する
if (sessionStorage.getItem(AUTH_SESSION_KEY) === '1') {
  unlockAdmin();
}

// ▼ここから追加：チャンネル自動発掘・精査機能（完全自動化） ============================================
// 役割：サーバー側（Cloudflare Workers）が、ゲームごとのキーワードでYouTubeを検索し、
//       「登録者数」「関連度」「直近1ヶ月の活動」の3つの基準で自動的にふるい分けを行う。
//       ここ（admin.html）では、①検索の実行ボタン ②ふるいに残った候補の確認・採用/却下 だけを行う。
// ポイント：検索やAPIキーの利用はすべてサーバー側で行われるため、ブラウザ側にAPIキーは一切出てこない。

let discoverCandidates = []; // 表示中の候補一覧（GET /api/candidates の結果。審査待ち or 却下済み）
let discoverStatusFilter = 'pending'; // 表示する候補の状態（pending=審査待ち／rejected=却下済み）
let discoverFilterGameId = ''; // 候補一覧の絞り込み（空文字なら全ゲーム）

// サーバーに「このキーワードで検索して」と依頼する(1キーワードずつ)
// minSubscribers:このチャンネルを審査するときの最低登録者数
// secondaryKeywords:プリセットのキーワードに加えて、審査のときに一緒に使う副次キーワードの配列
// streamOnly:trueなら「配信(ライブのアーカイブ)」だけに絞り込んで検索する
async function apiDiscoverSearchKeyword(gameId, keyword, minSubscribers, secondaryKeywords, streamOnly){
  const res = await fetch('/api/discover/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ gameId, keyword, minSubscribers, secondaryKeywords, streamOnly }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `検索に失敗しました(キーワード：${keyword})`);
  }
  return res.json();
}

// サーバーに「審査待ちの箱を少しだけ処理して」と依頼する(空になるまで繰り返し呼び出す)
async function apiDiscoverProcessBatch(){
  const res = await fetch('/api/discover/process', { method: 'POST' });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || '審査処理に失敗しました');
  }
  return res.json();
}

// 審査待ち・却下済みの候補一覧を取得する
async function apiGetCandidates(status, gameId){
  const params = new URLSearchParams({ status: status || 'pending' });
  if (gameId) params.set('gameId', gameId);
  const res = await fetch('/api/candidates?' + params.toString());
  if (!res.ok) throw new Error('候補一覧の取得に失敗しました');
  return res.json();
}

// 候補を採用する（本登録される）
async function apiApproveCandidate(channelId){
  const res = await fetch('/api/candidates/' + encodeURIComponent(channelId) + '/approve', { method: 'POST' });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || '採用に失敗しました');
  }
  return res.json();
}

// 候補を却下する
async function apiRejectCandidate(channelId){
  const res = await fetch('/api/candidates/' + encodeURIComponent(channelId) + '/reject', { method: 'POST' });
  if (!res.ok) throw new Error('却下に失敗しました');
  return res.json();
}

async function loadPendingCandidates(){
  const wrap = document.getElementById('discoverResultsList');
  if (wrap) wrap.innerHTML = '<p class="hint">読み込み中…</p>';
  try {
    discoverCandidates = await apiGetCandidates(discoverStatusFilter, discoverFilterGameId);
  } catch (e) {
    showToast(e.message || '候補一覧の取得に失敗しました');
    discoverCandidates = [];
  }
  if (activeType !== 'discover') return; // 読み込み中にタブが切り替えられていたら何もしない
  updateDiscoverHeading();
  renderDiscoverResultsList();
}

function updateDiscoverHeading(){
  const heading = document.getElementById('discoverListHeading');
  const label = discoverStatusFilter === 'rejected' ? '却下済みの候補' : '審査待ちの候補';
  if (heading) heading.textContent = `${label}（${discoverCandidates.length}件）`;
}

        <span class="discover-id">${c.channel_id}</span>
      </span>
      <div style="display:flex; gap:6px; flex-shrink:0;">
        ${actionsHtml}
      </div>
    </div>`;
  }).join('');

  if (!isPending) return; // 却下済み表示の場合はボタンがないのでここで終了

  wrap.querySelectorAll('[data-approve]').forEach(btn => {
    btn.addEventListener('click', () => handleCandidateDecision(btn.dataset.approve, 'approve'));
  });
  wrap.querySelectorAll('[data-reject]').forEach(btn => {
    btn.addEventListener('click', () => handleCandidateDecision(btn.dataset.reject, 'reject'));
  });
}

async function handleCandidateDecision(channelId, action){
  try {
    if (action === 'approve') {
      await apiApproveCandidate(channelId);
      showToast('採用し、本登録しました');
    } else {
      await apiRejectCandidate(channelId);
      showToast('却下しました');
    }
    discoverCandidates = discoverCandidates.filter(c => c.channel_id !== channelId);
    renderDiscoverResultsList();
    updateDiscoverHeading();
  } catch (e) {
    showToast(e.message || '処理に失敗しました');
  }
}

async function handleDiscoverSearch(){
  const gameId = document.getElementById('discoverGameSelect').value;
  const targetGameIds = gameId ? [gameId] : GAMES.map(g => g.id);
  const gameKeywords = (window.ASTRA_CONFIG && window.ASTRA_CONFIG.GAME_KEYWORDS) || {};

  // 最低登録者数(未入力・0以下なら既定値のためnullを渡し、サーバー側の既定値を使う)
  const minSubscribersInput = Number(document.getElementById('discoverMinSubscribers').value);
  const minSubscribers = minSubscribersInput > 0 ? minSubscribersInput : null;

  // 副次キーワード(カンマ区切りで入力された分を、前後の空白を除いて配列にする)
  const extraKeywords = document.getElementById('discoverExtraKeywords').value
    .split(',')
    .map(k => k.trim())
    .filter(Boolean);

  // 配信(ライブのアーカイブ)だけに絞り込むかどうか
  const streamOnly = document.getElementById('discoverStreamOnly').checked;

  const btn = document.getElementById('discoverSearchBtn');
  btn.disabled = true;

  try {
    // ①キーワードを1つずつサーバーに送って検索してもらう(Cloudflareの通信回数上限を超えないため)
    // ※プリセットのキーワードに加えて、副次キーワードでも同じように検索する
    let totalFound = 0;
    let totalQueued = 0;
    for (const gid of targetGameIds) {
      const keywords = [...(gameKeywords[gid] || []), ...extraKeywords];
      const gameName = (gameById(gid) || {}).name || gid;
      for (const keyword of keywords) {
        btn.textContent = `検索中…（${gameName}：${keyword}）`;
        const r = await apiDiscoverSearchKeyword(gid, keyword, minSubscribers, extraKeywords, streamOnly);
        if (r.error) {
          // YouTube側でエラーが起きている場合は、無駄に検索を続けず、ここで中断してはっきり伝える
          throw new Error(r.error);
        }
        totalFound += r.found || 0;
        totalQueued += r.queued || 0;
      }
    }

    // ②見つかった候補を、箱が空になるまで少しずつ審査してもらう
    let totalAdded = 0;
    let remaining = totalQueued;
    while (remaining > 0) {
      btn.textContent = `審査中…（残り約${remaining}件）`;
      const r = await apiDiscoverProcessBatch();
      totalAdded += r.added || 0;
      remaining = r.remaining || 0;
      if (!r.processed) break; // 念のための安全装置(無限ループ防止)
    }

    showToast(`検索完了：${totalFound}件見つかり、うち${totalAdded}件が基準を満たしました`);
    await loadPendingCandidates();
  } catch (e) {
    console.error('[AstralHub] チャンネル自動発掘に失敗しました', e);
    showToast(e.message || '検索に失敗しました');
  } finally {
    btn.disabled = false;
    btn.textContent = '候補を探す';
  }
}

// 「日本語率が未計算の古い候補」を、箱が空になるまで少しずつ再チェックする
async function apiRescreenBatch(){
  const res = await fetch('/api/candidates/rescreen', { method: 'POST' });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || '再チェックに失敗しました');
  }
  return res.json();
}

async function handleDiscoverRescreen(){
  const btn = document.getElementById('discoverRescreenBtn');
  btn.disabled = true;

  try {
    let totalKept = 0;
    let totalRejected = 0;
    let remaining = 1;
    while (remaining > 0) {
      btn.textContent = `再チェック中…（残り約${remaining}件）`;
      const r = await apiRescreenBatch();
      totalKept += r.kept || 0;
      totalRejected += r.rejected || 0;
      remaining = r.remaining || 0;
      if (!r.processed) break; // 念のための安全装置(無限ループ防止)
    }

    showToast(`再チェック完了：${totalKept}件が基準を満たして残り、${totalRejected}件を却下しました`);
    await loadPendingCandidates();
  } catch (e) {
    console.error('[AstralHub] 候補の再チェックに失敗しました', e);
    showToast(e.message || '再チェックに失敗しました');
  } finally {
    btn.disabled = false;
    btn.textContent = '日本語率が未計算の古い候補を再チェックする';
  }
}
