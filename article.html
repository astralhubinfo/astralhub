     サイト全体の紹介として表示されます。記事ごとの対応は将来のサーバー移行時の別課題とします。 -->

<!-- ▲ここまで追加 ==================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --page-bg: #f2f4f7;
    --surface: #ffffff;
    --surface-strong: #eef1f5;
    --border: #e6e9ee;
    --text: #12151b;
    --text-secondary: #6b7280;
    --text-faint: #9aa1ac;
    --accent: #2c5ce0;
    --accent-strong: #1c3fa8;
    --radius-sm: 4px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-display: 'Noto Sans JP', sans-serif;
    --font-mono: 'Roboto Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--page-bg); color: var(--text); font-family: var(--font-display); font-size: 14px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }

  .site-header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top:0; z-index: 20; }
  .header-inner { max-width: 760px; margin: 0 auto; padding: 12px 20px; display:flex; align-items:center; gap: 20px; }
  .logo img { height: 40px; }
  .back-link { margin-left:auto; font-size: 13px; font-weight: 500; color: var(--accent); }
  .back-link:hover { color: var(--accent-strong); }

  .page { max-width: 760px; margin: 0 auto; padding: 28px 20px 60px; }
  .article-panel { background: var(--surface); border:1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; }

  .tag-row { display:flex; gap:8px; margin-bottom: 14px; }
  .tag { font-size: 11.5px; font-weight:700; padding:3px 9px; border-radius:5px; color:#fff; white-space:nowrap; }
  .tag.tag-cat { background: var(--surface-strong); color: var(--text-secondary); }

  .article-title { font-size: 22px; font-weight: 900; line-height:1.5; margin: 0 0 10px; }
  .article-time { font-family: var(--font-mono); font-size: 12px; color: var(--text-faint); display:block; margin-bottom: 20px; }
  .article-body { font-size: 15px; color: var(--text); margin: 0 0 26px; white-space: pre-wrap; }

  .source-block { border-top: 1px solid var(--border); padding-top: 20px; }
  .source-label { font-size: 12px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .source-fallback-link {
    display: inline-block; margin-top: 8px; font-size: 13px; color: var(--accent); font-weight: 500;
  }
  .no-source { font-size: 13px; color: var(--text-faint); }

  .not-found { text-align:center; padding: 60px 20px; color: var(--text-faint); }
  .not-found a { color: var(--accent); font-weight:500; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="index.html"><img src="assets/logo.svg" alt="AstralHub"></a>
    <a class="back-link" href="index.html">← トップに戻る</a>
  </div>
</header>

<div class="page" id="page"></div>

<script src="assets/config.js"></script>
<script src="assets/site-data.js"></script>
<script>
const { CATEGORY_LABEL } = window.ASTRA_CONFIG;
const { gameById, timeAgoLabel, findNewsById } = window.ASTRA_DATA;

const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const item = id ? findNewsById(id) : null;
const pageEl = document.getElementById('page');

if (!item) {
  pageEl.innerHTML = `<div class="not-found">
    記事が見つかりませんでした。削除されたか、URLが正しくない可能性があります。<br>
    <a href="index.html">トップページに戻る</a>
  </div>`;
} else {
  const g = gameById(item.game);
  document.title = `${item.title} | AstralHub`;

  let sourceHtml = '<p class="no-source">この記事には元投稿のリンクが登録されていません。</p>';
  if (item.url) {
    sourceHtml = `
      <blockquote class="twitter-tweet"><a href="${item.url}"></a></blockquote>
      <a class="source-fallback-link" href="${item.url}" target="_blank" rel="noopener">元の投稿をXで見る ↗</a>
    `;
  }

  pageEl.innerHTML = `
    <div class="article-panel">
      <div class="tag-row">
        <span class="tag" style="background:${g.color}">${g.name}</span>
        <span class="tag tag-cat">${CATEGORY_LABEL[item.cat] || ''}</span>
      </div>
      <h1 class="article-title">${item.title}</h1>
      <span class="article-time">${timeAgoLabel(item.publishedAt)}・${new Date(item.publishedAt).toLocaleString('ja-JP')}</span>
      ${item.summary ? `<p class="article-body">${item.summary}</p>` : ''}
      <div class="source-block">
        <div class="source-label">Source</div>
        ${sourceHtml}
      </div>
    </div>
  `;

  // X投稿の埋め込みウィジェットを読み込む（元URLが登録されている場合のみ）
  if (item.url) {
    const script = document.createElement('script');
    script.async = true;
    script.src = 'https://platform.twitter.com/widgets.js';
    script.charset = 'utf-8';
    document.body.appendChild(script);
  }
}
</script>
</body>
</html>
